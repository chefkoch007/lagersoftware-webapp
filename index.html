<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ice Frocks · Warehouse OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:           #F4F6F9;
    --bg-2:         #ECEFF4;
    --card:         #FFFFFF;
    --card-2:       #FAFBFC;
    --line:         #E6E9EF;
    --line-2:       #EEF1F5;
    --ink:          #0B1220;
    --ink-2:        #1B2333;
    --muted:        #5A6477;
    --muted-2:      #8A93A5;
    --faint:        #B7BFCC;
    --blue:         #2F5AF3;
    --blue-700:     #1E40C4;
    --blue-50:      #EEF2FF;
    --blue-100:     #DEE5FF;
    --red:          #DC2626;
    --red-50:       #FEECEC;
    --green:        #16A34A;
    --green-50:     #E7F7EE;
    --amber:        #D97706;
    --amber-50:     #FEF3DA;
    --violet:       #7C3AED;
    --violet-50:    #F1EAFD;
    --r-xs: 8px; --r-sm: 10px; --r-md: 12px; --r-lg: 14px; --r-xl: 18px; --r-pill: 999px;
    --sh-1: 0 1px 0 rgba(11,18,32,0.04), 0 1px 2px rgba(11,18,32,0.04);
    --sh-2: 0 1px 0 rgba(11,18,32,0.04), 0 6px 18px -8px rgba(11,18,32,0.10);
    --sh-3: 0 24px 60px -28px rgba(11,18,32,0.25);
    --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "cv11","ss01","ss03";
  }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }
  input, select, textarea { font: inherit; color: inherit; }

  /* ── App shell (full-height flex column) ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  .app > .header { flex-shrink: 0; }
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }
  .app-body > .main,
  .app > .main {
    flex: 1;
    min-width: 0;
    overflow-y: auto;
    padding: 24px 28px 48px;
  }

  /* ── Header ── */
  .header {
    background: rgba(244,246,249,0.95);
    backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--line);
    z-index: 30;
  }
  .header-inner {
    display: flex; align-items: center; gap: 24px;
    padding: 14px 28px;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
  .logo-mark {
    width: 32px; height: 32px; border-radius: 9px;
    background: linear-gradient(135deg, var(--blue) 0%, #6F8BFF 100%);
    position: relative;
    box-shadow: inset 0 -6px 12px rgba(11,18,32,0.18), 0 2px 6px rgba(47,90,243,0.35);
  }
  .logo-mark::before {
    content:""; position: absolute; inset: 7px;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), transparent 45%),
                conic-gradient(from 210deg at 50% 50%, #ffffff 0deg 60deg, transparent 60deg 360deg);
    border-radius: 4px; mix-blend-mode: screen; opacity: 0.85;
  }
  .search { flex: 1; max-width: 520px; position: relative; }
  .search input {
    width: 100%; height: 40px; padding: 0 14px 0 40px;
    background: var(--card); border: 1px solid var(--line); border-radius: var(--r-pill);
    outline: none; transition: border 0.15s, box-shadow 0.15s; color: var(--ink);
  }
  .search input::placeholder { color: var(--muted-2); }
  .search input:focus { border-color: var(--blue); box-shadow: 0 0 0 4px var(--blue-50); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted-2); width: 16px; height: 16px; }
  .search-kbd { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-family: var(--font-mono); font-size: 11px; color: var(--muted-2); background: var(--bg-2); border-radius: 6px; padding: 3px 6px; }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .icon-btn {
    width: 40px; height: 40px; background: var(--card); border: 1px solid var(--line);
    border-radius: var(--r-pill); display: flex; align-items: center; justify-content: center;
    color: var(--ink-2); position: relative; transition: background 0.15s;
  }
  .icon-btn:hover { background: var(--bg-2); }
  .icon-btn .dot { position: absolute; top: 9px; right: 10px; width: 8px; height: 8px; background: var(--red); border-radius: 50%; border: 2px solid var(--card); }
  .user-pill {
    display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--line);
    border-radius: var(--r-pill); padding: 4px 14px 4px 4px; height: 40px; cursor: pointer;
  }
  .user-pill:hover { background: var(--bg-2); }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #C4D0FF 0%, #2F5AF3 100%);
    color: white; font-weight: 600; font-size: 12px;
    display: flex; align-items: center; justify-content: center; border: 2px solid white;
  }
  .user-pill .meta { display: flex; flex-direction: column; line-height: 1.1; }
  .user-pill .name { font-weight: 600; font-size: 13px; }
  .user-pill .role { font-size: 11px; color: var(--muted); }

  /* Tab bar */
  .tabs { display: flex; gap: 4px; padding: 0 28px 14px; align-items: center; overflow-x: auto; }
  .tab {
    display: inline-flex; align-items: center; gap: 8px; height: 38px; padding: 0 16px;
    border-radius: var(--r-pill); font-size: 13.5px; font-weight: 500; color: var(--muted);
    border: 1px solid transparent; white-space: nowrap; transition: all 0.15s;
  }
  .tab:hover { background: var(--bg-2); color: var(--ink-2); }
  .tab.active { background: var(--ink); color: #fff; }
  .tab.demo { border: 1px dashed var(--blue); color: var(--blue); background: var(--blue-50); margin-left: auto; }
  .tab.demo.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .tab .badge { font-size: 10px; background: rgba(255,255,255,0.18); padding: 2px 6px; border-radius: 999px; font-weight: 600; }
  .tab:not(.active) .badge { background: var(--red-50); color: var(--red); }

  /* Main area */
  .screen-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 24px; gap: 24px;
  }
  .screen-head h1 { font-size: 32px; line-height: 1.1; letter-spacing: -0.02em; font-weight: 700; margin: 0 0 4px; }
  .screen-head .greet { color: var(--muted); font-size: 14px; margin-bottom: 8px; display: block; }
  .head-actions { display: flex; gap: 10px; align-items: center; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 16px;
    border-radius: var(--r-pill); font-weight: 500; font-size: 13.5px; border: 1px solid var(--line);
    background: var(--card); color: var(--ink); transition: all 0.15s;
  }
  .btn:hover { background: var(--bg-2); }
  .btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset, 0 4px 10px -4px rgba(47,90,243,0.5); }
  .btn.primary:hover { background: var(--blue-700); }
  .btn.dark { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn.dark:hover { background: var(--ink-2); }
  .btn.ghost { background: transparent; }
  .btn.danger { background: var(--red); color: #fff; border-color: var(--red); }
  .btn.danger:hover { background: #b91c1c; }
  .btn.success { background: var(--green); color: #fff; border-color: var(--green); }
  .btn.lg { height: 48px; padding: 0 22px; font-size: 14.5px; }
  .btn.xl { height: 56px; padding: 0 26px; font-size: 16px; font-weight: 600; }
  .btn .icn { width: 16px; height: 16px; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* Card */
  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-xl); box-shadow: var(--sh-1); }
  .card-pad { padding: 22px 24px; }
  .card-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title h3 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .card-title .sub { font-size: 12px; color: var(--muted); margin-top: 2px; display: block; }

  /* Pills */
  .pill {
    display: inline-flex; align-items: center; gap: 6px; height: 22px; padding: 0 9px;
    font-size: 11.5px; font-weight: 600; border-radius: var(--r-pill); background: var(--bg-2); color: var(--ink-2);
  }
  .pill.dark { background: var(--ink); color: #fff; }
  .pill.blue { background: var(--blue-50); color: var(--blue-700); }
  .pill.red { background: var(--red-50); color: var(--red); }
  .pill.green { background: var(--green-50); color: var(--green); }
  .pill.amber { background: var(--amber-50); color: var(--amber); }
  .pill.violet { background: var(--violet-50); color: var(--violet); }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .pulse-dot { position: relative; width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
  .pulse-dot::after { content: ""; position: absolute; inset: -4px; border-radius: 50%; border: 2px solid var(--red); animation: pulse 1.6s ease-out infinite; }
  @keyframes pulse { 0% { transform: scale(0.6); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; padding: 12px 18px; border-radius: var(--r-pill);
    font-size: 13.5px; font-weight: 500; box-shadow: var(--sh-3); z-index: 200;
    display: flex; align-items: center; gap: 10px;
    opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast .ok { width: 18px; height: 18px; background: var(--green); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; }
  .toast .warn-ic { width: 18px; height: 18px; background: var(--amber); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #D8DDE6; border-radius: 999px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: #C2C8D4; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* KPI */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .kpi {
    padding: 20px 22px; border-radius: var(--r-xl); background: var(--card);
    border: 1px solid var(--line); box-shadow: var(--sh-1); position: relative; overflow: hidden;
  }
  .kpi .label { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; font-weight: 500; }
  .kpi .iconbox { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: var(--bg-2); color: var(--ink-2); }
  .kpi .val { margin-top: 14px; font-size: 36px; font-weight: 700; letter-spacing: -0.025em; line-height: 1; color: var(--ink); display: flex; align-items: baseline; gap: 8px; }
  .kpi .unit { font-size: 14px; color: var(--muted); font-weight: 500; }
  .kpi .delta { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; margin-top: 10px; }
  .kpi .delta.up { color: var(--green); }
  .kpi .delta.down { color: var(--red); }
  .kpi.warn { background: linear-gradient(180deg, #FFFBFB 0%, #FFFFFF 60%); border-color: #F8D6D6; }
  .kpi.warn .iconbox { background: var(--red-50); color: var(--red); }
  .kpi .spark { position: absolute; right: 12px; bottom: 12px; width: 90px; height: 30px; opacity: 0.85; }

  /* Activity */
  .activity { display: flex; flex-direction: column; gap: 0; }
  .activity-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px dashed var(--line-2); }
  .activity-item:last-child { border-bottom: none; }
  .activity-item .ai-dot { margin-top: 6px; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .activity-item .ai-body { flex: 1; min-width: 0; }
  .activity-item .ai-action { font-size: 13px; color: var(--ink); }
  .activity-item .ai-action b { font-weight: 600; }
  .activity-item .ai-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; display: flex; gap: 8px; align-items: center; }
  .ai-meta .sep { color: var(--faint); }

  /* Tables */
  .tbl-wrap { border: 1px solid var(--line); border-radius: var(--r-xl); background: var(--card); overflow: hidden; box-shadow: var(--sh-1); }
  .tbl { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
  .tbl thead th { text-align: left; font-weight: 500; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); padding: 14px 16px; background: var(--card-2); border-bottom: 1px solid var(--line); }
  .tbl tbody td { padding: 14px 16px; border-bottom: 1px solid var(--line-2); color: var(--ink-2); vertical-align: middle; }
  .tbl tbody tr:hover { background: #FBFCFE; }
  .tbl tbody tr.flash { animation: flash 1s ease-out; }
  @keyframes flash { 0% { background: var(--blue-50); } 100% { background: transparent; } }
  .tbl tbody tr:last-child td { border-bottom: none; }
  .tbl .num { font-variant-numeric: tabular-nums; }

  /* Forms */
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--muted); }
  .field input, .field select, .field textarea {
    height: 42px; padding: 0 14px; background: var(--card-2); border: 1px solid var(--line);
    border-radius: var(--r-md); outline: none; font-size: 14px; color: var(--ink);
    transition: border 0.15s, box-shadow 0.15s, background 0.15s;
  }
  .field textarea { padding-top: 10px; height: auto; min-height: 90px; resize: vertical; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--blue); background: var(--card); box-shadow: 0 0 0 3px var(--blue-50); }
  .field .hint { font-size: 11px; color: var(--muted-2); }

  /* Segmented control */
  .seg { display: inline-flex; background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--r-pill); padding: 4px; gap: 2px; }
  .seg button { height: 36px; padding: 0 18px; border-radius: var(--r-pill); font-size: 13px; font-weight: 500; color: var(--muted); transition: all 0.15s; }
  .seg button.on { background: var(--card); color: var(--ink); box-shadow: var(--sh-1); }

  /* Demo Simulator sidebar */
  .sim {
    width: 280px;
    flex-shrink: 0;
    border-left: 1px solid var(--line);
    background: linear-gradient(180deg, #0B1220 0%, #161E33 100%);
    color: #E5EAF5;
    display: flex; flex-direction: column;
    overflow: hidden;
    transition: width 0.2s ease;
  }
  .sim.collapsed { width: 50px; }
  .sim.collapsed .sim-body, .sim.collapsed .sim-head .sim-title { display: none; }
  .sim-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
  .sim.collapsed .sim-head { flex-direction: column; gap: 14px; padding: 16px 9px; justify-content: flex-start; }
  .sim-title { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
  .sim-title .led { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 12px var(--green); animation: led 1.4s ease-in-out infinite; }
  @keyframes led { 50% { opacity: 0.4; } }
  .sim-toggle { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.06); color: #E5EAF5; display: flex; align-items: center; justify-content: center; }
  .sim-toggle:hover { background: rgba(255,255,255,0.12); }
  .sim-body { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 18px; }
  .sim-section h4 { margin: 0 0 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #8B95AE; }
  .sim-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .sim-btn {
    flex: 1 1 calc(50% - 4px); min-width: 0; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.10); color: #E5EAF5; border-radius: 10px;
    padding: 12px 12px; text-align: left; transition: all 0.15s;
  }
  .sim-btn:hover { background: rgba(47,90,243,0.15); border-color: rgba(47,90,243,0.6); }
  .sim-btn .sb-prod { font-weight: 600; font-size: 13.5px; letter-spacing: -0.01em; display: flex; justify-content: space-between; align-items: center; }
  .sim-btn .sb-kind { font-size: 11px; color: #8B95AE; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
  .sim-btn .swatch { width: 10px; height: 10px; border-radius: 3px; }
  .sim-input-wrap { display: flex; flex-direction: column; gap: 10px; }
  .sim-input { width: 100%; height: 44px; padding: 0 14px; border-radius: 10px; background: rgba(0,0,0,0.30); border: 1px solid rgba(255,255,255,0.10); color: #fff; font-family: var(--font-mono); font-size: 13px; outline: none; }
  .sim-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(47,90,243,0.25); }
  .sim-flash {
    width: 100%; height: 56px; border-radius: 12px;
    background: linear-gradient(180deg, var(--blue) 0%, var(--blue-700) 100%);
    color: #fff; font-weight: 600; font-size: 15px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 8px 24px -10px rgba(47,90,243,0.7), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: transform 0.1s;
  }
  .sim-flash:hover { transform: translateY(-1px); }
  .sim-flash:active { transform: translateY(0); }
  .sim-feed { background: rgba(0,0,0,0.25); border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); padding: 12px; font-family: var(--font-mono); font-size: 11.5px; line-height: 1.7; max-height: 180px; overflow-y: auto; }
  .sim-feed .line { color: #8B95AE; }
  .sim-feed .line.ok { color: #6FE39B; }
  .sim-feed .line.warn { color: #F4B860; }
  .sim-feed .line .ts { color: #5A6477; margin-right: 6px; }
  .sim-stat { display: flex; justify-content: space-between; font-size: 12px; padding: 8px 12px; background: rgba(255,255,255,0.04); border-radius: 8px; }
  .sim-stat b { color: #fff; font-variant-numeric: tabular-nums; }

  /* iPad shell */
  .ipad { width: 100%; max-width: 1100px; margin: 0 auto; border-radius: 32px; padding: 22px; background: #161E33; box-shadow: 0 30px 80px -30px rgba(11,18,32,0.35); position: relative; }
  .ipad::before { content: ""; position: absolute; left: 50%; top: 12px; transform: translateX(-50%); width: 6px; height: 6px; background: #2a3450; border-radius: 50%; }
  .ipad-screen { background: var(--bg); border-radius: 18px; overflow: hidden; border: 1px solid #0a0f1c; }

  /* Bar chart helper */
  .bars { display: flex; align-items: stretch; gap: 14px; height: 200px; padding: 0 4px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; }
  .bar-group { width: 100%; flex: 1; display: flex; gap: 4px; align-items: flex-end; min-height: 0; }
  .bar { flex: 1; border-radius: 6px 6px 2px 2px; background: var(--ink); transition: height 0.4s cubic-bezier(.2,.8,.2,1); }
  .bar.b2 { background: var(--blue-100); }
  .bar.danger { background: var(--red); }
  .bar-col .lbl { font-size: 11.5px; color: var(--muted); }

  /* Label printable */
  .label-paper {
    width: 360px; background: white; border: 1px solid var(--line); border-radius: 12px;
    padding: 22px; box-shadow: var(--sh-2); font-family: var(--font-mono);
  }
  .label-paper .lp-head { display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px dashed var(--line); padding-bottom: 10px; margin-bottom: 14px; }
  .label-paper .lp-prod { font-family: var(--font-sans); font-weight: 700; font-size: 22px; letter-spacing: -0.02em; color: var(--ink); }
  .label-paper .lp-name { font-family: var(--font-sans); color: var(--muted); font-size: 13px; margin-top: 2px; }
  .label-paper .lp-charge { margin-top: 14px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .label-paper .lp-charge b { display: block; font-family: var(--font-mono); font-weight: 600; font-size: 18px; color: var(--ink); letter-spacing: 0.04em; margin-top: 2px; }
  .label-paper .qr { margin-top: 16px; aspect-ratio: 1; background: #fff; display: grid; grid-template-columns: repeat(21, 1fr); gap: 1px; padding: 8px; border: 1px solid var(--line); border-radius: 8px; }
  .label-paper .qr span { background: var(--ink); border-radius: 1px; }
  .label-paper .qr span.off { background: transparent; }
  .label-paper .lp-foot { display: flex; justify-content: space-between; margin-top: 12px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

  /* Excel-style table */
  .xls-shell { background: var(--card); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; box-shadow: var(--sh-1); }
  .xls-formulabar { display: flex; align-items: stretch; border-bottom: 1px solid var(--line); background: #F8FAFC; font-family: var(--font-mono); font-size: 12px; }
  .xls-namebox { width: 110px; padding: 0 10px; display: flex; align-items: center; justify-content: space-between; border-right: 1px solid var(--line); color: var(--ink); font-weight: 500; }
  .xls-fx { width: 38px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-style: italic; font-weight: 600; border-right: 1px solid var(--line); background: #fff; }
  .xls-content { flex: 1; padding: 0 12px; display: flex; align-items: center; background: #fff; color: var(--ink-2); font-size: 12.5px; }
  .xls-content .eq { color: var(--muted-2); margin-right: 6px; }
  .xls-scroll { overflow: auto; max-height: 560px; }
  table.xls { width: 100%; border-collapse: collapse; font-size: 12.5px; font-variant-numeric: tabular-nums; background: #fff; }
  table.xls th, table.xls td { border: 1px solid #E1E5EB; padding: 0; height: 28px; vertical-align: middle; white-space: nowrap; }
  table.xls thead.col-letters th { background: #ECEFF4; color: var(--muted); font-weight: 500; font-size: 11px; text-align: center; height: 22px; padding: 0 6px; position: sticky; top: 0; z-index: 4; }
  table.xls thead.col-names th { background: #F4F6F9; color: var(--ink); font-weight: 600; font-size: 11.5px; text-align: left; padding: 6px 10px; height: 32px; text-transform: none; letter-spacing: 0; position: sticky; top: 22px; z-index: 3; }
  table.xls thead.col-names th.center { text-align: center; }
  table.xls thead.col-names th.sub { font-weight: 500; color: var(--muted); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em; }
  table.xls thead.group-row th { background: #E6ECF5; color: var(--ink); font-weight: 600; font-size: 11px; text-align: center; padding: 4px 6px; height: 22px; text-transform: uppercase; letter-spacing: 0.05em; position: sticky; top: 54px; z-index: 3; }
  table.xls th.rownum, table.xls td.rownum { background: #ECEFF4; color: var(--muted); font-weight: 500; text-align: center; width: 38px; min-width: 38px; position: sticky; left: 0; z-index: 2; border-right: 1px solid #C5CCD8; }
  table.xls td.rownum { font-size: 11px; }
  table.xls tr.selected td.rownum { background: #2F5AF3; color: #fff; }
  table.xls td { padding: 4px 10px; color: var(--ink-2); }
  table.xls td.center { text-align: center; }
  table.xls td.num    { text-align: right; padding-right: 14px; }
  table.xls td.mono   { font-family: var(--font-mono); font-size: 11.5px; letter-spacing: 0.02em; }
  table.xls tbody tr:hover td:not(.rownum) { background: #F8FAFD; }
  table.xls tbody tr.flash td:not(.rownum) { animation: flashCell 1.4s ease-out; }
  table.xls tbody tr.selected td:not(.rownum) { background: #F2F5FF; }
  @keyframes flashCell { 0% { background: #DEE5FF; } 100% { background: transparent; } }
  table.xls .xs-pill { display: inline-flex; align-items: center; gap: 4px; height: 18px; padding: 0 7px; font-size: 10.5px; font-weight: 600; border-radius: 4px; }
  table.xls .xs-pill.green  { background: #DDF4E6; color: #0F7A36; }
  table.xls .xs-pill.amber  { background: #FCEFD3; color: #8A5800; }
  table.xls .xs-pill.blue   { background: #DEE5FF; color: var(--blue-700); }
  table.xls .xs-pill.violet { background: #ECE0FC; color: #5E22C2; }
  table.xls .xs-pill.gray   { background: #E6E9EF; color: var(--muted); }
  table.xls .xs-pill.red    { background: #FBDCDC; color: #B91C1C; }
  table.xls td.neg { color: var(--red); }
  table.xls td.pos { color: var(--green); }
  table.xls td.warn-cell { background: #FFF7E6; }
  table.xls td.danger-cell { background: #FEE7E7; }
  table.xls .pcode { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 3px; color: #fff; font-weight: 700; font-size: 9.5px; margin-right: 6px; vertical-align: middle; }
  .xls-tabs { display: flex; align-items: center; gap: 0; background: #ECEFF4; border-top: 1px solid var(--line); padding: 0 8px; font-size: 12px; overflow-x: auto; }
  .xls-tabs button { height: 30px; padding: 0 14px; color: var(--muted); border-right: 1px solid #DCE0E8; background: transparent; }
  .xls-tabs button.on { background: #fff; color: var(--ink); font-weight: 600; border-top: 2px solid var(--blue); border-right: 1px solid var(--line); border-left: 1px solid var(--line); margin-top: -1px; }
  .xls-tabs .add { color: var(--muted-2); border-right: none; }
  .xls-status { display: flex; align-items: center; gap: 16px; padding: 6px 14px; background: #F4F6F9; border-top: 1px solid var(--line); font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .xls-status .sep { width: 1px; height: 12px; background: var(--line); }
  .xls-status b { color: var(--ink); font-weight: 600; }

  /* Layout helpers */
  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .grid-cards { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; margin-top: 20px; }
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { height: 32px; padding: 0 12px; border-radius: var(--r-pill); border: 1px solid var(--line); background: var(--card); font-size: 12.5px; font-weight: 500; color: var(--ink-2); display: inline-flex; align-items: center; gap: 6px; }
  .chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* Scanner viewport */
  .scan-viewport { position: relative; height: 340px; border-radius: 18px; background: linear-gradient(180deg, #0E1428 0%, #1A2342 100%); border: 1px solid #0a0f1c; overflow: hidden; color: #fff; }
  .scan-viewport .grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 40px 40px; }
  .scan-frame { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 240px; height: 240px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.15); }
  .scan-frame .c1, .scan-frame .c2, .scan-frame .c3, .scan-frame .c4 { position: absolute; width: 32px; height: 32px; border: 3px solid var(--blue); }
  .scan-frame .c1 { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 16px; }
  .scan-frame .c2 { top: -2px; right: -2px; border-left: none; border-bottom: none; border-top-right-radius: 16px; }
  .scan-frame .c3 { bottom: -2px; left: -2px; border-right: none; border-top: none; border-bottom-left-radius: 16px; }
  .scan-frame .c4 { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 16px; }
  .scan-line { position: absolute; left: 16px; right: 16px; height: 2px; background: linear-gradient(90deg, transparent, var(--blue) 50%, transparent); box-shadow: 0 0 18px var(--blue); animation: scanLine 2.2s ease-in-out infinite; }
  @keyframes scanLine { 0%, 100% { top: 28px; } 50% { top: calc(100% - 28px); } }
  .scan-hint { position: absolute; bottom: 18px; left: 0; right: 0; text-align: center; font-size: 12px; color: rgba(255,255,255,0.55); letter-spacing: 0.06em; text-transform: uppercase; }

  /* Charge preview box */
  .charge-preview { background: var(--ink); color: #fff; border-radius: var(--r-lg); padding: 18px 22px; font-family: var(--font-mono); display: flex; flex-direction: column; gap: 4px; }
  .charge-preview .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #8B95AE; }
  .charge-preview .nr { font-size: 28px; font-weight: 600; letter-spacing: 0.05em; }
  .charge-preview .parts { display: flex; gap: 4px; font-size: 11px; color: #8B95AE; margin-top: 4px; }
  .charge-preview .parts span.hi { color: #fff; }

  /* Misc helpers */
  .h-rule { height: 1px; background: var(--line); margin: 28px 0; }
  .anno { background: var(--card); border: 1px dashed var(--line); border-radius: var(--r-md); padding: 12px 14px; font-size: 12px; color: var(--muted); display: flex; gap: 10px; align-items: flex-start; }
  .anno .star { width: 18px; height: 18px; border-radius: 50%; background: var(--blue-50); color: var(--blue); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }

  /* Modal overlay */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(11,18,32,0.45); backdrop-filter: blur(4px);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--r-xl);
    padding: 28px; width: 480px; max-width: 90vw; box-shadow: var(--sh-3);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h2 { margin: 0 0 6px; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .modal .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; display: block; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

  /* ── PRINT STYLES ── */
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    html, body { margin: 0 !important; padding: 0 !important; }
    .app { display: none !important; }
    #print-zone {
      display: flex !important;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      align-items: flex-start; justify-content: flex-start;
      flex-wrap: wrap; gap: 20px; padding: 20px;
      background: white;
    }
    #print-zone .label-paper {
      box-shadow: none !important;
      border: 1px solid #ccc !important;
      page-break-inside: avoid;
    }
  }

  /* ── Responsive 2-column utility (stacks on phones) ── */
  .cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  /* ── MOBILE (phones) ── */
  @media (max-width: 768px) {
    body { font-size: 15px; }
    .app { height: auto; min-height: 100vh; overflow: visible; }
    .app-body { flex-direction: column; overflow: visible; }
    .app > .main, .app-body > .main { padding: 16px 14px 40px; overflow: visible; }

    /* Header: logo + compact user, wrap, no fixed search width */
    .header-inner { flex-wrap: wrap; gap: 10px; padding: 12px 14px; }
    .user-pill .meta { display: none; }
    .user-pill { padding: 4px; }

    /* Tabs: horizontal scroll, easy to tap */
    .tabs { padding: 0 12px 12px; gap: 6px; }
    .tab { height: 40px; font-size: 14px; }

    /* Screen heading shrinks and stacks */
    .screen-head { flex-direction: column; align-items: stretch; gap: 12px; margin-bottom: 16px; }
    .screen-head h1 { font-size: 24px; }
    .head-actions { flex-wrap: wrap; }

    /* Any 2-column layout becomes single column */
    .cols-2 { grid-template-columns: 1fr; gap: 14px; }
    .grid-2, .grid-3, .grid-cards, .kpi-grid { grid-template-columns: 1fr; }

    /* Buttons a touch larger for fingers */
    .btn { height: 44px; }

    /* Excel table stays scrollable horizontally */
    .xls-scroll { max-height: 60vh; }
  }
</style>
</head>

  <!-- Print portal: hidden at runtime, visible only on print -->
  <div id="print-zone" style="display:none;"></div>

</body>
</html>
